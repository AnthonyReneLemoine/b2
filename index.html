<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BANK - v8</title>
    <style>
        :root { --bg: #f0f2f5; --primary: #2c3e50; --accent: #3498db; --success: #27ae60; --danger: #e74c3c; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; }
        .header-banner { background: #2c3e50; color: white; position: fixed; top: 0; left: 0; right: 0; height: 65px; z-index: 1000; display: flex; justify-content: space-around; align-items: center; }
        .recap-item { text-align: center; }
        .recap-val { font-size: 16px; font-weight: bold; display: block; }
        .recap-label { font-size: 9px; text-transform: uppercase; color: #bdc3c7; }
        .tab-bar { position: fixed; top: 65px; left: 0; right: 0; height: 40px; background: #fff; border-bottom: 1px solid #e0e0e0; display: flex; z-index: 999; }
        .tab-btn { flex: 1; border: none; background: none; font-size: 12px; font-weight: 700; color: #7f8c8d; cursor: pointer; }
        .tab-btn.active { color: var(--accent); border-bottom: 3px solid var(--accent); }
        .screen { display: none; width: 100%; padding: 120px 15px 30px 15px; box-sizing: border-box; flex-direction: column; align-items: center; }
        .screen.active { display: flex; }
        .card { background: white; width: 100%; max-width: 400px; padding: 20px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .total-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #eee; }
        .val-dep { color: var(--danger); font-weight: bold; }
        .val-rec { color: var(--success); font-weight: bold; }
        .version { position: fixed; bottom: 5px; right: 10px; font-size: 9px; color: #ccc; }
    </style>
</head>
<body>

    <div class="header-banner">
        <div class="recap-item"><span class="recap-label">Recettes</span><span class="recap-val" id="headRecette">...</span></div>
        <div class="recap-item"><span class="recap-label">Dépenses</span><span class="recap-val" id="headDepense">...</span></div>
        <div class="recap-item"><span class="recap-label">Solde</span><span class="recap-val" id="headSolde">...</span></div>
    </div>

    <div class="tab-bar">
        <button class="tab-btn active" onclick="showScreen('saisie')">✏️ Saisie</button>
        <button class="tab-btn" onclick="showScreen('historique')">🕐 Flux</button>
        <button class="tab-btn" onclick="showScreen('rapport')">📊 Rapport</button>
    </div>

    <div class="screen active" id="screen-saisie">
        <p>Prêt pour une nouvelle saisie.</p>
    </div>

    <div class="screen" id="screen-historique">
        <div id="history-list" style="width:100%; max-width:400px;"></div>
    </div>

    <div class="screen" id="screen-rapport">
        <div class="card">
            <h3 style="margin:0 0 15px 0; text-align:center;">Synthèse des 1935 lignes</h3>
            <div class="total-row"><span>Total Recettes :</span><span id="repRec" class="val-rec">0,00 €</span></div>
            <div class="total-row"><span>Total Dépenses :</span><span id="repDep" class="val-dep">0,00 €</span></div>
            <div class="total-row" style="border:none; margin-top:10px; font-size:18px;">
                <span>Solde Net :</span><span id="repSolde" style="font-weight:bold;">0,00 €</span>
            </div>
            <button onclick="lancerCalculTotal()" style="width:100%; margin-top:20px; padding:12px; border:none; border-radius:10px; background:var(--accent); color:white; font-weight:bold;">
                🔄 Recalculer tout
            </button>
        </div>
    </div>

    <div class="version">VERSION 8</div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, getDocs, query, orderBy, limit, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyABmCu61-jScR4yDAqFKJ_RXwcKAmok4pg",
            authDomain: "banque-3fd70.firebaseapp.com",
            projectId: "banque-3fd70",
            storageBucket: "banque-3fd70.firebasestorage.app",
            messagingSenderId: "892055695539",
            appId: "1:892055695539:web:731b02c49224949ba1c0c6"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const opsColl = collection(db, "operations");

        // Fonction de nettoyage de nombre ultra-robuste
        const cleanNum = (val) => {
            if (!val || val === "") return 0;
            if (typeof val === "number") return val;
            // Si c'est du texte, on remplace la virgule par un point et on nettoie les espaces
            let n = parseFloat(val.toString().replace(',', '.').replace(/\s/g, ''));
            return isNaN(n) ? 0 : n;
        };

        window.lancerCalculTotal = async () => {
            document.getElementById('repRec').innerText = "Calcul...";
            const snap = await getDocs(opsColl);
            let totalR = 0;
            let totalD = 0;

            snap.forEach(doc => {
                const data = doc.data();
                totalR += cleanNum(data["Recettes"]);
                totalD += cleanNum(data["Dépenses"]);
            });

            const solde = totalR - totalD;
            
            // Mise à jour Affichage
            const fmt = (n) => n.toLocaleString('fr-FR', { style: 'currency', currency: 'EUR' });
            document.getElementById('repRec').innerText = fmt(totalR);
            document.getElementById('repDep').innerText = fmt(totalD);
            document.getElementById('repSolde').innerText = fmt(solde);
            
            // Mise à jour Header
            document.getElementById('headRecette').innerText = fmt(totalR);
            document.getElementById('headDepense').innerText = fmt(totalD);
            document.getElementById('headSolde').innerText = fmt(solde);
        };

        window.showScreen = (n) => {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('screen-' + n).classList.add('active');
            if(n === 'rapport') lancerCalculTotal();
        };

        // Lancement initial
        lancerCalculTotal();
    </script>
</body>
</html>
