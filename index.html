<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HERMINE Finance - Version Corrigée</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, query, orderBy, limit, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyABmCu61-jScR4yDAqFKJ_RXwcKAmok4pg",
            authDomain: "banque-3fd70.firebaseapp.com",
            projectId: "banque-3fd70",
            storageBucket: "banque-3fd70.firebasestorage.app",
            messagingSenderId: "892055695539",
            appId: "1:892055695539:web:731b02c49224949ba1c0c6"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const opsCollection = collection(db, "operations");

        // --- ENREGISTREMENT ---
        window.saveOperation = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;

            const montantSaisi = parseFloat(document.getElementById('montant').value);
            
            // On prépare l'objet avec TES champs exacts
            const op = {
                "Date": document.getElementById('date').value,
                "Tiers": document.getElementById('tiers').value,
                "Dépenses": montantSaisi < 0 ? Math.abs(montantSaisi) : "",
                "Recettes": montantSaisi >= 0 ? montantSaisi : "",
                "moyen de paiement": document.getElementById('paiement').value,
                "note": "",
                "E/C": "c", // Valeurs par défaut vues dans ton screen
                "P": "x",
                "V": ""
            };

            try {
                await addDoc(opsCollection, op);
                document.getElementById('opForm').reset();
                document.getElementById('date').valueAsDate = new Date();
                alert("Opération enregistrée !");
            } catch (error) {
                console.error("Erreur:", error);
                alert("Erreur lors de l'enregistrement.");
            } finally {
                btn.disabled = false;
            }
        };

        // --- AFFICHAGE (Lecture avec tes champs) ---
        // Attention : On trie sur "Date" (avec majuscule)
        const q = query(opsCollection, orderBy("Date", "desc"), limit(25));
        
        onSnapshot(q, (snapshot) => {
            const list = document.getElementById('recentOps');
            list.innerHTML = '';
            
            snapshot.forEach((doc) => {
                const data = doc.data();
                
                // Logique pour afficher soit la dépense, soit la recette
                const depense = parseFloat(data["Dépenses"]) || 0;
                const recette = parseFloat(data["Recettes"]) || 0;
                const montantAffiche = recette > 0 ? recette : -depense;
                
                // Formatage de la date pour l'affichage (si c'est du ISO)
                const dateAffichee = data["Date"] ? data["Date"].split('T')[0] : "---";

                const row = `
                    <tr class="border-b text-sm hover:bg-gray-50">
                        <td class="p-3 text-gray-600">${dateAffichee}</td>
                        <td class="p-3">
                            <div class="font-bold text-slate-800">${data["Tiers"] || "Inconnu"}</div>
                            <div class="text-[10px] text-gray-400 uppercase">${data["moyen de paiement"] || ""}</div>
                        </td>
                        <td class="p-3 text-right font-black ${montantAffiche < 0 ? 'text-red-500' : 'text-green-600'}">
                            ${montantAffiche.toFixed(2)}€
                        </td>
                    </tr>`;
                list.innerHTML += row;
            });
        }, (error) => {
            console.error("Erreur flux:", error);
        });

        window.onload = () => { document.getElementById('date').valueAsDate = new Date(); };
    </script>
</head>
<body class="bg-slate-100 min-h-screen p-4 font-sans">
    <div class="max-w-md mx-auto">
        <header class="mb-6 text-center">
            <h1 class="text-2xl font-black text-slate-900">HERMINE <span class="text-blue-600">BANK</span></h1>
        </header>

        <div class="bg-white p-5 rounded-2xl shadow-lg border border-slate-200 mb-6">
            <form id="opForm" onsubmit="saveOperation(event)" class="space-y-4">
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="text-[10px] font-bold text-gray-400 uppercase">Date</label>
                        <input type="date" id="date" required class="w-full border-gray-200 border rounded-lg p-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-gray-400 uppercase">Montant (+/-)</label>
                        <input type="number" step="0.01" id="montant" placeholder="Ex: -16.64" required class="w-full border-gray-200 border rounded-lg p-2 text-sm font-bold outline-none">
                    </div>
                </div>

                <div>
                    <label class="text-[10px] font-bold text-gray-400 uppercase">Tiers (Libellé)</label>
                    <input type="text" id="tiers" placeholder="Ex: Casino, Leclerc..." required class="w-full border-gray-200 border rounded-lg p-2 text-sm outline-none">
                </div>

                <div>
                    <label class="text-[10px] font-bold text-gray-400 uppercase">Moyen de paiement</label>
                    <select id="paiement" class="w-full border-gray-200 border rounded-lg p-2 text-sm bg-white outline-none">
                        <option>Carte Bancaire</option>
                        <option>Espèces</option>
                        <option>Virement</option>
                        <option>Prélèvement</option>
                    </select>
                </div>

                <button type="submit" id="submitBtn" class="w-full bg-slate-900 text-white font-bold py-3 rounded-xl hover:bg-blue-600 transition-all shadow-md active:scale-95">
                    Ajouter l'opération
                </button>
            </form>
        </div>

        <div class="bg-white rounded-2xl shadow-lg border border-slate-200 overflow-hidden">
            <div class="p-4 border-b bg-gray-50 flex justify-between items-center">
                <span class="font-bold text-slate-700 text-xs uppercase tracking-widest">Derniers flux</span>
            </div>
            <table class="w-full text-left">
                <tbody id="recentOps">
                    </tbody>
            </table>
        </div>
    </div>
</body>
</html>
